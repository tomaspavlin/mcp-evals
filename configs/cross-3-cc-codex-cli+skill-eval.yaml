# Skill connector is apify-only; wire apify via skill + github via cli.
job_name: cross-3-cc-codex-cli+skill-eval
app_connectors:
  apify: cli+skill
  github: cli
n_concurrent_trials: 3
tasks:
  - path: tasks/cross-actor-username-and-repo-language
  - path: tasks/cross-actor-meta-and-repo-meta
  - path: tasks/cross-search-actor-and-repo-licenses
agents:
  - name: claude-code
    model_name: anthropic/claude-sonnet-4.6@preset/anthropic-provider-only
  - name: claude-code
    model_name: anthropic/claude-opus-4.7@preset/anthropic-provider-only
  - name: codex
    model_name: openai/gpt-5.4
