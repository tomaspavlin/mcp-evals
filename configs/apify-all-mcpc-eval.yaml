job_name: apify-all-mcpc-eval
connector: mcpc
n_concurrent_trials: 2
datasets:
  - path: tasks
    task_names: ["apify-*"]
    exclude_task_names: ["apify-mcp-connected"]
agents:
  - name: claude-code
    model_name: anthropic/claude-haiku-4.5
  - name: opencode
    model_name: openrouter/deepseek/deepseek-v4-flash@preset/deepseek-provider-only
