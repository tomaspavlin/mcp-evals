# Skill channel is apify-only; wire apify via skill + github via cli.
job_name: cross-3-cc-codex-skill-eval
connector_channels:
  apify: skill
  github: cli
n_concurrent_trials: 3
tasks:
  - path: tasks/cross-actor-username-and-repo-language
  - path: tasks/cross-actor-meta-and-repo-meta
  - path: tasks/cross-search-actor-and-repo-licenses
agents:
  - name: claude-code
    model_name: anthropic/claude-sonnet-4-6
  - name: claude-code
    model_name: anthropic/claude-opus-4-7
  - name: codex
    model_name: openai/gpt-5.4
