job_name: apify-all-opencode-cheap-mcp-eval
n_concurrent_trials: 2
n_attempts: 2

datasets:
  - path: tasks
    task_names: ["apify-*"]

extra_instruction_paths:
  - instructions/apify-mcp.md

agents:
  - name: opencode
    model_name: openrouter/google/gemini-2.5-flash-lite
    mcp_servers:
      - name: apify
        transport: stdio
        command: /usr/local/bin/apify-mcp-proxy
        args: []
    kwargs:
      max_budget_usd: 1.50
      max_turns: 20
  - name: opencode
    model_name: openrouter/qwen/qwen3-coder
    mcp_servers:
      - name: apify
        transport: stdio
        command: /usr/local/bin/apify-mcp-proxy
        args: []
    kwargs:
      max_budget_usd: 1.50
      max_turns: 20
  - name: opencode
    model_name: openrouter/mistralai/mistral-small-3.2-24b-instruct
    mcp_servers:
      - name: apify
        transport: stdio
        command: /usr/local/bin/apify-mcp-proxy
        args: []
    kwargs:
      max_budget_usd: 1.50
      max_turns: 20

environment:
  # docker (local) until Apify hosts are added to Daytona's outbound allowlist.
  # See docs/harbor-constraints.md "Daytona outbound network is allowlisted by tier".
  type: docker

verifier:
  env:
    EVAL_VARIANT: mcp
