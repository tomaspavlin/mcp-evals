job_name: apify-all-mcp-eval
n_concurrent_trials: 2

datasets:
  - path: tasks
    task_names: ["apify-*"]

extra_instruction_paths:
  - instructions/apify-mcp.md

agents:
  - name: claude-code
    model_name: anthropic/claude-haiku-4.5
    mcp_servers:
      - name: apify
        transport: stdio
        command: /usr/local/bin/apify-mcp-proxy
        args: []
    kwargs:
      max_budget_usd: 1.50
      max_turns: 20
  - name: opencode
    model_name: openrouter/deepseek/deepseek-chat-v3.1
    mcp_servers:
      - name: apify
        transport: stdio
        command: /usr/local/bin/apify-mcp-proxy
        args: []
    kwargs:
      max_budget_usd: 1.50
      max_turns: 20

environment:
  # docker (local) until Apify hosts are added to Daytona's outbound allowlist.
  # See docs/harbor-constraints.md "Daytona outbound network is allowlisted by tier".
  type: docker

verifier:
  env:
    EVAL_VARIANT: mcp
