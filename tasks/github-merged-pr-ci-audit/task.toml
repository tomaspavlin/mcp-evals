version = "1.0"

[task]
name = "mcp-evals/github-merged-pr-ci-audit"
description = "axi/merged_pr_ci_audit: Look at the 10 most recently merged PRs in openclaw/openclaw. For each one, report the tit... LLM trajectory judge."

[metadata]
difficulty = "hard"
category = "investigation"
tags = ["read-only", "investigation"]
axi_task = "merged_pr_ci_audit"

[mcp_evals]
apps = ["github"]

[verifier]
timeout_sec = 600.0

[agent]
timeout_sec = 600.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
