version = "1.0"

[task]
name = "mcp-evals/github-run-then-jobs"
description = "axi/run_then_jobs: List recent workflow runs in openclaw/openclaw, pick the most recent completed one, then v... LLM trajectory judge."

[metadata]
difficulty = "medium"
category = "multi_step"
tags = ["read-only", "multi-step"]
axi_task = "run_then_jobs"

[mcp_evals]
apps = ["github"]

[verifier]
timeout_sec = 420.0

[agent]
timeout_sec = 300.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
