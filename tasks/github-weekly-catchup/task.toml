version = "1.0"

[task]
name = "mcp-evals/github-weekly-catchup"
description = "axi/weekly_catchup: Catch me up on openclaw/openclaw: how many issues are currently open, what are the 5 most ... LLM trajectory judge."

[metadata]
difficulty = "hard"
category = "investigation"
tags = ["read-only", "investigation"]
axi_task = "weekly_catchup"

[mcp_evals]
apps = ["github"]

[verifier]
timeout_sec = 600.0

[agent]
timeout_sec = 600.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
