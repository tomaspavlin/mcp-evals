version = "1.0"

[task]
name = "connector-evals/apify-maps-place-info"
description = "Find a place on Google Maps via a self-selected Apify Actor; trajectory judge verifies actor choice."

[metadata]
difficulty = "medium"
category = "actor-selection"
tags = ["read-only", "single-actor"]

[connector_evals]
apps = ["apify"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 300.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
