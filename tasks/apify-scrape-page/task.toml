version = "1.0"

[verifier]
timeout_sec = 60.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 300.0
cpus = 1
memory_mb = 2048
storage_mb = 10240

[environment.env]
APIFY_TOKEN = "${APIFY_TOKEN}"

[[environment.mcp_servers]]
name = "apify"
transport = "stdio"
command = "/usr/local/bin/apify-mcp-proxy"
args = []
