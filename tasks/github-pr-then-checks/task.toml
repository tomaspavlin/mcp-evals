version = "1.0"

[task]
name = "mcp-evals/github-pr-then-checks"
description = "axi/pr_then_checks: View pull request #50863 in openclaw/openclaw, then check its CI status and report how man... LLM trajectory judge."

[metadata]
difficulty = "medium"
category = "multi_step"
tags = ["read-only", "multi-step"]
axi_task = "pr_then_checks"

[verifier]
timeout_sec = 420.0

[agent]
timeout_sec = 300.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
