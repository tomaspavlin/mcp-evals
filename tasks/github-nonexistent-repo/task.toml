version = "1.0"

[task]
name = "mcp-evals/github-nonexistent-repo"
description = "axi/nonexistent_repo: List issues in openclaw/this-does-not-exist and tell me what happened. LLM trajectory judge."

[metadata]
difficulty = "easy"
category = "error_recovery"
tags = ["read-only", "error-recovery"]
axi_task = "nonexistent_repo"

[mcp_evals]
apps = ["github"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 120.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
