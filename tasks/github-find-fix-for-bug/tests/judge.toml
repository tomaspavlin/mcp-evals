# Faithful axi-style grading (kunchenguid/axi bench-github): a single binary
# verdict from a trajectory judge. The judge reads the agent's reasoning, tool
# calls, and final answer from the trajectory (no answer.md) - exactly like
# axi's grader, which graded {prompt + grading_hint + trajectory}.
#
# Judge model must be litellm-mapped because atif-trajectory triggers
# get_model_info to size the trajectory token budget; deepseek-v4-* are NOT
# mapped yet, so use the newest mapped deepseek (v3.2).
[judge]
judge = "openrouter/deepseek/deepseek-v3.2"
atif-trajectory = "/logs/agent/trajectory.json"
mode = "individual"

[[criterion]]
name = "task_complete"
description = """KNOWN FACTS: The agent must identify a specific issue number and title, then actually search for PRs referencing it (not just guess). The conclusion about whether a fix is in progress must be based on search results, not assumption.\n\nGrade PASS only if the agent actually executed GitHub commands / tool calls to obtain the data AND produced a correct, complete answer for the task. Grade FAIL if it hallucinated data without running commands, ran commands but misinterpreted the results, or gave a partial answer when a complete one was requested."""
type = "binary"
