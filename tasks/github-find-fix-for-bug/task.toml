version = "1.0"

[task]
name = "mcp-evals/github-find-fix-for-bug"
description = "axi/find_fix_for_bug: Find the most recent open issue in openclaw/openclaw labeled 'bug'. Check if any open PRs ... LLM trajectory judge."

[metadata]
difficulty = "hard"
category = "investigation"
tags = ["read-only", "investigation"]
axi_task = "find_fix_for_bug"

[mcp_evals]
apps = ["github"]

[verifier]
timeout_sec = 600.0

[agent]
timeout_sec = 600.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
