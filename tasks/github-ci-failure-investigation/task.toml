version = "1.0"

[task]
name = "connector-evals/github-ci-failure-investigation"
description = "axi/ci_failure_investigation: Look at the 5 most recent failed workflow runs in openclaw/openclaw. For each one, report ... LLM trajectory judge."

[metadata]
difficulty = "hard"
category = "investigation"
tags = ["read-only", "investigation"]
axi_task = "ci_failure_investigation"

[connector_evals]
apps = ["github"]

[verifier]
timeout_sec = 600.0

[agent]
timeout_sec = 600.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
