version = "1.0"

[task]
name = "mcp-evals/github-release-then-body"
description = "axi/release_then_body: List releases for openclaw/openclaw, find the release tagged v2026.3.13-1, then view its f... LLM trajectory judge."

[metadata]
difficulty = "medium"
category = "multi_step"
tags = ["read-only", "multi-step"]
axi_task = "release_then_body"

[mcp_evals]
apps = ["github"]

[verifier]
timeout_sec = 420.0

[agent]
timeout_sec = 300.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
