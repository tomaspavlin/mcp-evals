version = "1.0"

[task]
name = "mcp-evals/github-pr-info"
description = "Report a GitHub PR's title, author, and merge status; LLM judge grades the answer."

[metadata]
difficulty = "easy"
category = "lookup"
tags = ["read-only"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 180.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
