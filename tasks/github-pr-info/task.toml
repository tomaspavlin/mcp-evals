version = "1.0"

[task]
name = "mcp-evals/github-pr-info"
description = "axi/view_pr: View pull request #50782 in openclaw/openclaw and report its title, author, and whether it... LLM trajectory judge."

[metadata]
difficulty = "easy"
category = "single_step"
tags = ["read-only", "single-step"]
axi_task = "view_pr"

[mcp_evals]
apps = ["github"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 180.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
