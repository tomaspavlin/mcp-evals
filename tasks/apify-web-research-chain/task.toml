version = "1.0"

[task]
name = "mcp-evals/apify-web-research-chain"
description = "Chain a search Actor then a crawler Actor to research Crawlee; trajectory judge verifies the two-step process."

[metadata]
difficulty = "hard"
category = "multi-step-chaining"
tags = ["read-only", "two-actor"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 480.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
