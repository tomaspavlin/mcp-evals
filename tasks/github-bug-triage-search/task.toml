version = "1.0"

[task]
name = "mcp-evals/github-bug-triage-search"
description = "axi/bug_triage_search: Search for issues in openclaw/openclaw mentioning 'rate limit'. How many results are there... LLM trajectory judge."

[metadata]
difficulty = "hard"
category = "investigation"
tags = ["read-only", "investigation"]
axi_task = "bug_triage_search"

[mcp_evals]
connectors = ["github"]

[verifier]
timeout_sec = 600.0

[agent]
timeout_sec = 600.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
