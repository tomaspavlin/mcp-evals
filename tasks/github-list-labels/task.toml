version = "1.0"

[task]
name = "connector-evals/github-list-labels"
description = "axi/list_labels: List the labels in openclaw/openclaw and report how many there are. LLM trajectory judge."

[metadata]
difficulty = "easy"
category = "single_step"
tags = ["read-only", "single-step"]
axi_task = "list_labels"

[connector_evals]
apps = ["github"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 300.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
