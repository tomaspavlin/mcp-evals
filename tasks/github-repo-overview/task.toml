version = "1.0"

[task]
name = "connector-evals/github-repo-overview"
description = "axi/repo_overview: Report the star count, primary language, and default branch of openclaw/openclaw. LLM trajectory judge."

[metadata]
difficulty = "easy"
category = "single_step"
tags = ["read-only", "single-step"]
axi_task = "repo_overview"

[connector_evals]
apps = ["github"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 300.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
