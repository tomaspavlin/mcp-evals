version = "1.0"

[task]
name = "mcp-evals/github-list-releases"
description = "axi/list_releases: List releases for openclaw/openclaw and report the 3 most recent tag names. LLM trajectory judge."

[metadata]
difficulty = "easy"
category = "single_step"
tags = ["read-only", "single-step"]
axi_task = "list_releases"

[mcp_evals]
connectors = ["github"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 180.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
