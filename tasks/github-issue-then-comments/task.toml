version = "1.0"

[task]
name = "mcp-evals/github-issue-then-comments"
description = "axi/issue_then_comments: Find the most recent open issue in openclaw/openclaw with the label 'bug', then view its c... LLM trajectory judge."

[metadata]
difficulty = "medium"
category = "multi_step"
tags = ["read-only", "multi-step"]
axi_task = "issue_then_comments"

[mcp_evals]
connectors = ["github"]

[verifier]
timeout_sec = 420.0

[agent]
timeout_sec = 300.0

[verifier.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
# Rewardkit always sends `reasoning_effort` to the judge; DeepSeek models on
# OpenRouter expose `reasoning` (not `reasoning_effort`), so litellm raises
# UnsupportedParamsError. Drop unsupported params instead of erroring.
LITELLM_DROP_PARAMS = "True"
